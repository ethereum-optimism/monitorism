name: branch build

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'op-monitorism/**'
      - 'op-defender/**'
      - 'docker-bake.hcl'
      - '.github/workflows/branches.yaml'
      - '.github/images.json'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix_json: ${{ steps.detect.outputs.matrix_json }}
      has_images: ${{ steps.detect.outputs.has_images }}
    steps:
      - name: Checkout
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6
        with:
          fetch-depth: 0
      - name: Detect affected images
        id: detect
        uses: ethereum-optimism/factory/actions/detect-changes@cc1794a8e99695971560f5354076fbe2ddca9f2e

  build:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_images == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix_json) }}
    uses: ethereum-optimism/factory/.github/workflows/docker.yaml@cc1794a8e99695971560f5354076fbe2ddca9f2e
    with:
      mode: ${{ matrix.mode || 'build' }}
      image_name: ${{ matrix.image_name }}
      bake_file: ${{ matrix.bake_file || 'docker-bake.hcl' }}
      target: ${{ matrix.target || '' }}
      tag: pr-${{ github.event.pull_request.number }}
      gcp_project_id: ${{ vars.GCP_PROJECT_ID_OPLABS_TOOLS_ARTIFACTS }}
      registry: us-docker.pkg.dev/oplabs-tools-artifacts/images
      set: |
        *.args.GIT_COMMIT=${{ github.sha }}
        *.args.GIT_DATE=${{ github.event.head_commit.timestamp }}
    permissions:
      contents: read
      id-token: write
      attestations: write
